<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Album</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1 class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          Photo Album
        </h1>
        <div class="header-actions">
          <button class="slideshow-btn" id="slideshowBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span>Slideshow</span>
          </button>
          <button class="upload-btn" id="uploadBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Upload Photos
          </button>
        </div>
      </div>
    </header>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Upload Photos</h2>
          <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="drop-zone" id="dropZone">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p>Tap to select photos</p>
          <span class="file-label">Browse Files</span>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="width:0;height:0;overflow:hidden;position:fixed;top:-1px;left:-1px;">
        <div class="preview-area" id="previewArea"></div>
        <button class="submit-btn" id="submitBtn" disabled>Upload</button>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightboxClose">&times;</button>
      <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
      <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <div class="lightbox-actions">
        <button class="lightbox-delete" id="lightboxDelete">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          Delete
        </button>
      </div>
    </div>

    <!-- Slideshow -->
    <div class="slideshow" id="slideshow">
      <div class="slideshow-images">
        <img class="slideshow-img slideshow-img-active" id="slideshowImg1" src="" alt="">
        <img class="slideshow-img" id="slideshowImg2" src="" alt="">
      </div>
      <div class="slideshow-overlay">
        <div class="slideshow-top-bar">
          <div class="slideshow-info">
            <span class="slideshow-counter" id="slideshowCounter">1 / 10</span>
            <span class="slideshow-viewers" id="slideshowViewers">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span id="viewerCount">1</span>
            </span>
          </div>
          <button class="slideshow-exit" id="slideshowExit">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="slideshow-controls">
          <button class="slideshow-control-btn" id="slideshowPrev">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <button class="slideshow-control-btn slideshow-play-btn" id="slideshowPlayPause">
            <svg class="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
          <button class="slideshow-control-btn" id="slideshowNext">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
        <div class="slideshow-bottom-bar">
          <div class="slideshow-speed">
            <label for="speedSlider">Speed</label>
            <input type="range" id="speedSlider" min="2" max="15" value="5" step="1">
            <span id="speedLabel">5s</span>
          </div>
          <div class="slideshow-share">
            <button class="slideshow-share-btn" id="slideshowShare">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
              </svg>
              Copy Link
            </button>
          </div>
        </div>
      </div>
      <div class="slideshow-progress" id="slideshowProgress">
        <div class="slideshow-progress-fill" id="slideshowProgressFill"></div>
      </div>
    </div>

    <!-- Gallery -->
    <main class="gallery-container">
      <div class="empty-state" id="emptyState">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <h2>No photos yet</h2>
        <p>Upload your first photos to get started</p>
      </div>
      <div class="gallery" id="gallery"></div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
